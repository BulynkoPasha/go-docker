name: Build and Deploy Go App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v3
    - name: Build Docker image
      shell: bash
      run: docker build -t go-demo .
    - name: Run Docker container
      shell: bash
      run: docker run -d -p 8888:8888 go-demo
